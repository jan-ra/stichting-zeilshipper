name: Backup CMS database to R2

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Snapshot SQLite on Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%d)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"

          # Online backup via sqlite3 — safe against a live Payload writer.
          flyctl ssh console -a stichting-zeilshipper-cms \
            -C "sqlite3 /data/payload.db \".backup /data/backup-${STAMP}.db\""

          # Pull the snapshot off the machine.
          flyctl ssh sftp get -a stichting-zeilshipper-cms \
            "/data/backup-${STAMP}.db" "./backup-${STAMP}.db"

          # Clean up on-machine snapshot.
          flyctl ssh console -a stichting-zeilshipper-cms \
            -C "rm /data/backup-${STAMP}.db"

      - name: Upload backup to R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws s3 cp "./backup-${STAMP}.db" \
            "s3://zeilshipper-media/db-backups/${STAMP}.db" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Retention is enforced by the R2 bucket lifecycle rule
          # (7-day expiration on the db-backups/ prefix). No cleanup here.
