services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER:          ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-wordpress}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # healthcheck.sh is bundled with mariadb:11 and connects via the unix
      # socket as root — no hardcoded credentials, works with any password.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  wordpress:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_USER:     ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME:     ${MYSQL_DATABASE:-wordpress}

      # PHP constants injected into wp-config.php by the official WP entrypoint
      WORDPRESS_CONFIG_EXTRA: |
        define( 'DISALLOW_FILE_EDIT',           true );
        define( 'DISALLOW_FILE_MODS',           true );
        define( 'DISALLOW_UNFILTERED_HTML',     true );
        define( 'AUTOMATIC_UPDATER_DISABLED',   true );
        define( 'WP_POST_REVISIONS',            3    );

      # Credentials for the initial accounts created by 04-roles.php
      WP_ADMIN_USER:     ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-changeme_admin}
      WP_ADMIN_EMAIL:    ${WP_ADMIN_EMAIL:-admin@localhost}
      WP_EDITOR_USER:    ${WP_EDITOR_USER:-editor}
      WP_EDITOR_PASSWORD: ${WP_EDITOR_PASSWORD:-changeme_editor}
      WP_EDITOR_EMAIL:   ${WP_EDITOR_EMAIL:-editor@localhost}
      WP_TITLE:          ${WP_TITLE:-Stichting Zeilshipper}

volumes:
  db_data:
