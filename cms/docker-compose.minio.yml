services:
  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"   # S3 API — what Payload talks to
      - "9001:9001"   # Web console — http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Runs once on startup to create the bucket and set it to public.
  createbuckets:
    image: quay.io/minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/zeilshipper-media --ignore-existing &&
        mc anonymous set public local/zeilshipper-media &&
        echo 'Bucket ready.'
      "

volumes:
  minio-data:
