# fly.toml — Payload CMS on fly.io.
#
# First-time setup:
#   fly launch --no-deploy --copy-config --name <your-app-name>
#   fly volumes create data --size 1 --region ams
#   fly secrets set PAYLOAD_SECRET=$(openssl rand -hex 32)
#   fly secrets set DATABASE_URI="file:/data/payload.db"
#   fly secrets set PAYLOAD_PUBLIC_URL="https://<your-app-name>.fly.dev"
#   fly deploy

app            = "stichting-zeilshipper-cms"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/api/access"

[[mounts]]
  source      = "data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "1gb"
